<!DOCTYPE html>
<html>
<head>
    <title>Connection Test</title>
</head>
<body>
    <h1>Testing Client-Server Connection</h1>
    <div id="results"></div>
    
    <script>
        async function testConnection() {
            const results = document.getElementById('results');
            
            try {
                // Test if we can reach the server
                const response = await fetch('http://localhost:5000/api/auth', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: 'test@example.com',
                        password: 'test123456'
                    })
                });
                
                const data = await response.json();
                results.innerHTML = `
                    <h3 style="color: green;">✓ Connection Successful!</h3>
                    <p>Server Response: ${JSON.stringify(data)}</p>
                    <p>Status: ${response.status}</p>
                `;
            } catch (error) {
                results.innerHTML = `
                    <h3 style="color: red;">✗ Connection Failed!</h3>
                    <p>Error: ${error.message}</p>
                    <p>This usually means:</p>
                    <ul>
                        <li>CORS issues (server not allowing requests from localhost:3000)</li>
                        <li>Network connectivity issues</li>
                        <li>Server not running on port 5000</li>
                    </ul>
                `;
            }
        }
        
        // Run test on page load
        testConnection();
    </script>
</body>
</html>
