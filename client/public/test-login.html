<!DOCTYPE html>
<html>
<head>
    <title>Test Login Functionality</title>
</head>
<body>
    <h1>Test Login Functionality</h1>
    <form id="loginForm">
        <input type="email" id="email" placeholder="Email" value="test@example.com" required>
        <input type="password" id="password" placeholder="Password" value="test123456" required>
        <button type="submit">Login</button>
    </form>
    <div id="result"></div>
    
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const result = document.getElementById('result');
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                console.log('Attempting login with:', { email, password });
                console.log('API URL:', 'http://localhost:5000/api/auth');
                
                const response = await fetch('http://localhost:5000/api/auth', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password })
                });
                
                console.log('Response status:', response.status);
                console.log('Response headers:', Object.fromEntries(response.headers.entries()));
                
                const data = await response.json();
                console.log('Response data:', data);
                
                if (response.ok) {
                    result.innerHTML = `<p style="color: green;">✓ Login successful! Token: ${data.token.substring(0, 20)}...</p>`;
                } else {
                    result.innerHTML = `<p style="color: red;">✗ Login failed: ${data.msg || 'Unknown error'}</p>`;
                }
            } catch (error) {
                console.error('Login error:', error);
                result.innerHTML = `<p style="color: red;">✗ Login error: ${error.message}</p>`;
            }
        });
    </script>
</body>
</html>
